version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: eventhub-postgres-prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secret}
      POSTGRES_DB: eventhub
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: valkey/valkey:7-alpine
    container_name: eventhub-redis-prod
    volumes:
      - redis_prod_data:/data

  minio:
    image: minio/minio:latest
    container_name: eventhub-minio-prod
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_prod_data:/data
    command: server /data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: prod
    container_name: eventhub-api-prod
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_PORT=${MINIO_PORT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET_EVENTS=${MINIO_BUCKET_EVENTS}
      - MINIO_BUCKET_CERTIFICATES=${MINIO_BUCKET_CERTIFICATES}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - APP_URL=${APP_URL}
      - API_URL=${API_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: prod
    container_name: eventhub-frontend-prod
    environment:
      - NODE_ENV=production
      - PORT=3000
      - API_URL=${API_URL}
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      target: prod
    container_name: eventhub-worker-prod
    environment:
      - NODE_ENV=production
      - REDIS_URL=${REDIS_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    build:
      context: ./infra/nginx
    container_name: eventhub-nginx-prod
    ports:
      - "80:80"
    depends_on:
      - api
      - frontend

volumes:
  postgres_prod_data:
  redis_prod_data:
  minio_prod_data:
